<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LA CAVE — Maison du Vin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

:root{
  --paper:#15100E; --surface:#1E1714; --surface2:#271D18; --ink:#F1E7D4; --soft:#C4B7A2;
  --muted:#8E8273; --line:#3A2D26; --line2:#2A201B;
  --orange:#C9A862; --orange-deep:#B0904A; --orange-tint:rgba(201,168,98,.14);
  --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{background:#100B0A;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;}
#bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(120% 85% at 50% -15%, #3A0F1E 0%, rgba(58,15,30,0) 52%),
  radial-gradient(110% 75% at 85% 115%, #241712 0%, rgba(36,23,18,0) 60%),
  linear-gradient(180deg,#15100E 0%, #0E0A09 100%);}
#bg::before{content:"";position:absolute;inset:-60%;background:conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(201,168,98,.05) 40deg, transparent 90deg, transparent 360deg);animation:sheen 46s linear infinite;}
#bg::after{content:"";position:absolute;inset:0;background-image:
  radial-gradient(1.4px 1.4px at 12% 22%, rgba(231,210,150,.55), transparent 60%),
  radial-gradient(1.2px 1.2px at 28% 68%, rgba(231,210,150,.4), transparent 60%),
  radial-gradient(1.6px 1.6px at 47% 38%, rgba(231,210,150,.5), transparent 60%),
  radial-gradient(1.1px 1.1px at 63% 80%, rgba(231,210,150,.4), transparent 60%),
  radial-gradient(1.5px 1.5px at 78% 28%, rgba(231,210,150,.55), transparent 60%),
  radial-gradient(1.2px 1.2px at 88% 60%, rgba(231,210,150,.4), transparent 60%),
  radial-gradient(1.3px 1.3px at 38% 88%, rgba(231,210,150,.45), transparent 60%),
  radial-gradient(1.1px 1.1px at 70% 12%, rgba(231,210,150,.4), transparent 60%);
  background-size:cover;animation:dust 24s ease-in-out infinite alternate;}
@keyframes sheen{to{transform:rotate(360deg);}}
@keyframes dust{0%{opacity:.35;transform:translateY(0)}50%{opacity:.7}100%{opacity:.4;transform:translateY(-14px)}}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--orange-tint);}

.hd{position:sticky;top:0;z-index:30;background:rgba(18,12,11,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.hd-in{max-width:1180px;margin:0 auto;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.brand{display:flex;flex-direction:column;line-height:1;}
.brand b{font-family:var(--serif);font-weight:500;font-size:24px;letter-spacing:.04em;}
.brand span{font-size:9.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.nav{display:flex;align-items:center;gap:2px;flex-wrap:wrap;}
.nav button{background:none;border:none;color:var(--soft);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:9px 14px;position:relative;}
.nav button:hover{color:var(--ink);}
.nav button.on{color:var(--orange);}
.nav button.on::after{content:"";position:absolute;left:14px;right:14px;bottom:3px;height:1.5px;background:var(--orange);}
.gear{width:32px;height:32px;border:1px solid var(--line);border-radius:50%;background:none;color:var(--soft);font-size:14px;}
.gear:hover{color:var(--orange);border-color:var(--orange);}

.wrap{max-width:1180px;margin:0 auto;padding:52px 28px 90px;}
.sec{animation:rise .55s cubic-bezier(.2,.7,.2,1);}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.eyebrow{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--orange);margin-bottom:18px;}
.display{font-family:var(--serif);font-weight:300;font-size:clamp(40px,7vw,76px);line-height:1.02;letter-spacing:-.01em;margin:0;}
.display em{font-style:italic;color:var(--orange);}
.lede{color:var(--soft);font-size:16px;max-width:62ch;margin:18px 0 0;}
.muted{color:var(--muted);}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:44px;border-top:1px solid var(--orange);}
.stat{padding:22px 22px 22px 0;border-right:1px solid var(--line);}
.stat:last-child{border-right:0;}
.stat .n{font-family:var(--serif);font-weight:300;font-size:clamp(34px,5vw,52px);line-height:1;letter-spacing:-.02em;}
.stat .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:12px;}

.alert{display:flex;gap:16px;align-items:baseline;margin:38px 0;padding:20px 22px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--orange);}
.invest{margin-top:18px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.invest b{font-family:var(--serif);font-size:18px;color:var(--ink);text-transform:none;letter-spacing:0;margin-left:6px;}
.peak{margin-top:30px;background:linear-gradient(120deg,#5A1020,#27101A);border:1px solid var(--orange);color:var(--ink);border-radius:8px;padding:22px 24px;box-shadow:0 20px 40px -24px rgba(0,0,0,.7);}
.peak-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.peak-h span:first-child{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);}
.peak-n{font-family:var(--serif);font-size:28px;line-height:1;color:var(--orange);}
.peak-list{display:flex;flex-wrap:wrap;gap:9px;}
.peak-chip{background:rgba(201,168,98,.12);border:1px solid rgba(201,168,98,.4);color:var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;}
.peak-chip:hover{background:rgba(201,168,98,.24);}
.peak-chip b{font-weight:600;}.peak-chip i{font-style:normal;opacity:.8;}
.alert .t{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);font-weight:600;white-space:nowrap;}
.alert .x{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--soft);}

.atlas-head{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin:54px 0 8px;}
.atlas-head h2{font-family:var(--serif);font-weight:400;font-size:30px;margin:0;}
.toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;}
.toggle button{background:none;border:none;padding:9px 22px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);}
.toggle button.on{background:var(--orange);color:#1b120a;}
.mapcard{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:18px;position:relative;overflow:hidden;}
.mapcard svg{width:100%;height:auto;display:block;}
.land{fill:rgba(201,187,163,.10);stroke:rgba(201,168,98,.16);stroke-width:.15;}
.fr-outline{fill:rgba(201,187,163,.09);stroke:rgba(201,168,98,.4);stroke-width:.5;}
.grat{stroke:rgba(201,187,163,.08);stroke-width:.12;fill:none;}
.dot{fill:var(--orange);fill-opacity:.92;stroke:#15100E;stroke-width:.4;cursor:pointer;transition:fill-opacity .15s;}
.dot:hover{fill-opacity:1;}
.dot-ring{fill:none;stroke:var(--orange);stroke-width:.3;opacity:.45;}
.dot.empty{fill:rgba(201,187,163,.3);fill-opacity:.7;}
.dot.asel{stroke:var(--orange);stroke-width:.8;}
.chip.dim{opacity:.5;}
.terroir{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:26px 28px;animation:rise .4s ease;}
.terroir-h{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line2);padding-bottom:14px;margin-bottom:18px;}
.terroir-h h3{font-family:var(--serif);font-weight:400;font-size:26px;margin:0;}
.terroir-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;}
.terroir-grid span,.terroir-notes span{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;}
.terroir-grid p,.terroir-notes p{margin:0;font-size:14px;color:var(--ink);line-height:1.5;}
.terroir-notes{margin-top:18px;border-top:1px solid var(--line2);padding-top:18px;}
.terroir-notes p{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--soft);}
.mapsel{position:absolute;left:18px;top:18px;background:var(--ink);color:var(--paper);padding:8px 14px;border-radius:3px;font-size:12px;letter-spacing:.04em;pointer-events:none;}
.mapsel b{font-family:var(--serif);font-weight:500;}
.legend{display:flex;flex-wrap:wrap;gap:8px 10px;margin-top:24px;}.chip{display:inline-flex;align-items:baseline;gap:8px;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12.5px;color:var(--soft);background:var(--surface);}
.chip b{font-family:var(--serif);color:var(--ink);font-size:14px;}
.chip i{font-style:normal;color:var(--orange);font-size:11px;font-weight:600;}
.ins{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:24px;}
.ins-col h4{font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 14px;}
.ins-row{display:grid;grid-template-columns:110px 1fr 30px;align-items:center;gap:12px;margin-bottom:9px;font-size:13px;}
.ins-l{color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ins-t{height:6px;background:var(--line2);border-radius:3px;overflow:hidden;}
.ins-f{display:block;height:100%;background:var(--orange);border-radius:3px;}
.ins-v{text-align:right;font-family:var(--serif);font-size:15px;}
@media(max-width:820px){.ins{grid-template-columns:1fr;gap:18px;}}

.cab{max-width:640px;margin:30px auto 0;}
.cab3{position:relative;max-width:440px;margin:30px auto 0;background:#1c1b18;border-radius:8px;overflow:hidden;}
.cabswitch{display:flex;gap:6px;align-items:center;margin-top:20px;}
.cabtab{border:1px solid var(--line);background:none;color:var(--soft);font-size:13px;letter-spacing:.04em;padding:9px 18px;border-radius:999px;}
.cabtab.on{background:var(--orange);color:#1b120a;border-color:var(--orange);}
.cabtab:hover:not(.on){border-color:var(--orange);color:var(--orange);}
.cabren{border:1px solid var(--line);background:none;color:var(--muted);width:34px;height:34px;border-radius:50%;font-size:13px;}
.cabren:hover{color:var(--orange);border-color:var(--orange);}
.cab3-img{width:100%;display:block;}
.cab3-ov{position:absolute;left:27%;width:46%;top:12%;height:79%;display:flex;flex-direction:column;gap:1.1%;}
.cz{flex:1;background:rgba(18,13,11,.5);backdrop-filter:blur(1px);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:3px 5px;display:flex;flex-direction:column;justify-content:center;min-height:0;}
.cz-lab{font-size:8px;letter-spacing:.04em;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;}
.cz-lab b{font-family:var(--serif);font-weight:500;color:var(--orange);font-size:11px;}
.cz-lab i{font-style:normal;margin-left:auto;color:rgba(255,255,255,.55);}
.cz-slots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-content:center;flex:1;overflow:hidden;}
.cc{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);box-sizing:border-box;padding:0;}
.cc.full{background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--c) 60%,#fff) 0%, var(--c) 55%);border:1px solid rgba(0,0,0,.35);box-shadow:0 1px 2px rgba(0,0,0,.4);cursor:pointer;}
.cc.full:hover{outline:2px solid #fff;outline-offset:1px;}
.cc[data-place]{cursor:pointer;}
.cc[data-place]:hover{background:rgba(201,168,98,.5);border-color:var(--orange);}
.cc.full.peak{box-shadow:0 0 0 2px var(--orange),0 0 8px 1px rgba(201,168,98,.7);animation:peakpulse 2s ease-in-out infinite;}
@keyframes peakpulse{0%,100%{box-shadow:0 0 0 2px var(--orange),0 0 6px 0 rgba(201,168,98,.5);}50%{box-shadow:0 0 0 2px var(--orange),0 0 11px 2px rgba(201,168,98,.95);}}
#catip{position:fixed;z-index:80;background:var(--ink);color:var(--paper);font-size:12px;padding:8px 11px;border-radius:5px;max-width:240px;pointer-events:none;display:none;box-shadow:0 8px 24px -8px rgba(0,0,0,.5);line-height:1.4;}
@media(max-width:820px){.cab3{max-width:340px;}.cc{width:10px;height:10px;}.cz-lab{font-size:7px;}}
.cabinet{margin:30px 0 0;border:2px solid var(--ink);border-radius:8px;padding:14px;background:linear-gradient(180deg,#fff,#FBF7F0);box-shadow:0 30px 50px -30px rgba(28,27,24,.3);}
.cab-shelf{display:grid;grid-template-columns:96px 1fr;gap:14px;align-items:center;padding:12px 6px;border-bottom:1px solid var(--line);}
.cab-shelf:last-child{border-bottom:0;}
.cab-side{display:flex;flex-direction:column;gap:1px;}
.cab-side b{font-family:var(--serif);font-weight:300;font-size:26px;color:var(--orange);line-height:1;}
.cab-side span{font-size:10.5px;color:var(--soft);}
.cab-side i{font-style:normal;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.cab-rail{display:flex;flex-wrap:wrap;gap:5px;padding:10px 8px;background:linear-gradient(180deg,#F3EEE3,#EFE8DA);border-radius:4px;border:1px solid var(--line);}
.slot{position:relative;width:26px;height:46px;border-radius:3px;background:#fff;border:1px solid var(--line2);display:flex;align-items:flex-end;justify-content:center;}
.slot.full{cursor:pointer;border-color:var(--line);}
.slot.full:hover{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-tint);}
.vb{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:11px;height:34px;border-radius:5px 5px 2px 2px;background:linear-gradient(180deg,color-mix(in srgb,var(--c) 70%,#000) 0%,var(--c) 38%);box-shadow:inset 0 5px 3px -3px rgba(255,255,255,.5);}
.vb::after{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:4px;height:7px;background:var(--c);border-radius:2px;}
.slotn{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:7px;color:var(--muted);}
.slot.full .slotn{color:rgba(255,255,255,.0);}
.caleg{display:flex;flex-wrap:wrap;gap:16px;margin-top:18px;font-size:12px;color:var(--soft);}
.legi{display:inline-flex;align-items:center;gap:7px;}
.legi .vb{position:static;transform:none;width:9px;height:20px;}
@media(max-width:820px){.cab-shelf{grid-template-columns:72px 1fr;}.slot{width:22px;height:40px;}}.cab-frame{border:1px solid var(--ink);border-radius:3px;padding:8px;background:var(--surface);display:flex;flex-direction:column;gap:6px;}
.shelf{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:18px;padding:18px 20px;border:1px solid var(--line);border-radius:2px;background:var(--surface);text-align:left;transition:background .15s,border-color .15s;position:relative;overflow:hidden;}
.shelf:hover{border-color:var(--orange);background:#fffdfa;}
.shelf.on{border-color:var(--orange);background:var(--orange-tint);}
.shelf .num{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--orange);line-height:1;}
.shelf .ti{font-family:var(--serif);font-size:20px;line-height:1.1;}
.shelf .su{font-size:12px;color:var(--muted);margin-top:3px;}
.shelf .ct{font-family:var(--serif);font-size:26px;font-weight:300;text-align:right;}
.shelf .ct small{display:block;font-family:var(--sans);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}

.panel{margin-top:40px;}
.panel-h{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--orange);padding-bottom:14px;margin-bottom:26px;}
.panel-h h3{font-family:var(--serif);font-weight:400;font-size:26px;margin:0;}
.link{background:none;border:none;color:var(--orange);font-size:12px;letter-spacing:.08em;text-transform:uppercase;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;}
.card .ph{aspect-ratio:4/3;background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.card .ph img{width:100%;height:100%;object-fit:cover;}
.card .ph .none{font-family:var(--serif);font-size:30px;color:var(--line);}
.card .bd{padding:18px 18px 16px;}
.card .pr{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.card .nm{font-family:var(--serif);font-size:21px;line-height:1.12;margin:3px 0 8px;}
.card .nm i{font-style:italic;color:var(--orange);}
.card .me{font-size:12.5px;color:var(--soft);margin-bottom:12px;min-height:18px;}
.prices{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;font-size:11.5px;color:var(--muted);}
.prices b{color:var(--ink);font-weight:600;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.tag{font-size:10.5px;letter-spacing:.04em;padding:4px 10px;border:1px solid var(--line);border-radius:999px;color:var(--soft);}
.tag.o{border-color:var(--orange);color:var(--orange);}
.tag.ow{border-color:var(--ink);color:var(--ink);}
.foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line2);padding-top:12px;}
.cact{display:flex;gap:8px;margin-bottom:12px;}
.cact button{flex:1;border:1px solid var(--line);background:none;color:var(--soft);font-size:11.5px;padding:8px 6px;border-radius:2px;}
.cact button:hover{border-color:var(--orange);color:var(--orange);}
.starrow{display:flex;gap:3px;}
.star{background:none;border:none;font-size:19px;line-height:1;color:var(--line);padding:0 1px;}
.star.on{color:var(--orange);}
.star:hover{color:var(--orange-deep);}
.qty{display:flex;align-items:center;gap:12px;}
.qty button{width:26px;height:26px;border:1px solid var(--line);background:none;border-radius:50%;font-size:15px;color:var(--ink);}
.qty button:hover{border-color:var(--orange);color:var(--orange);}
.qty span{font-family:var(--serif);font-size:18px;min-width:16px;text-align:center;}
.del{background:none;border:none;color:var(--muted);font-size:11.5px;}
.del:hover{color:var(--orange);}
.score{font-family:var(--serif);font-size:22px;color:var(--orange);float:right;line-height:1;}

.add{display:grid;grid-template-columns:340px 1fr;gap:40px;margin-top:40px;align-items:start;}
.drop{position:sticky;top:96px;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:22px;display:flex;flex-direction:column;gap:16px;align-items:center;}
.drop img{width:100%;max-height:340px;object-fit:contain;border-radius:3px;}
.drop .ph0{width:100%;aspect-ratio:3/4;border:1px dashed var(--line);border-radius:3px;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;color:var(--muted);}
.drop .ph0 b{font-family:var(--serif);font-size:38px;color:var(--line);font-weight:300;}
.reading{display:flex;align-items:center;gap:9px;color:var(--soft);font-size:13px;}
.spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--orange);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.warn{font-size:12.5px;color:var(--orange-deep);text-align:center;line-height:1.5;}
.conf{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

.btn{border:1px solid var(--ink);background:none;color:var(--ink);padding:13px 22px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;border-radius:2px;transition:.15s;}
.btn:hover{background:var(--ink);color:var(--paper);}
.btn.fill{background:var(--orange);border-color:var(--orange);color:#1b120a;}
.btn.fill:hover{background:var(--orange-deep);border-color:var(--orange-deep);}
.btn.full{width:100%;}
.btn[disabled]{opacity:.5;}

.review-top{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.review-top h3{font-family:var(--serif);font-weight:400;font-size:24px;margin:0;}
.bform{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:22px;margin-bottom:18px;}
.bform .bh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
.bform .bh .ix{font-family:var(--serif);font-size:18px;}
.bform .bh .ix span{color:var(--orange);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fld{display:flex;flex-direction:column;gap:6px;}
.fld>label{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.fld input,.fld select,.fld textarea,.srch,.conn input{

async function apiPost(b){const r=await fetch(CFG.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({token:CFG.token},b))});const j=await r.json();if(!j.ok)throw new Error(j.error||'failed');return j;}

function compress(file,max,q){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const im=new Image();im.onload=()=>{let w=im.width,h=im.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>max){w=Math.round(w*max/h);h=max;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(im,0,0,w,h);res(c.toDataURL('image/jpeg',q));};im.onerror=rej;im.src=e.target.result;};r.onerror=rej;r.readAsDataURL(file);});}

function frRegionOf(w){const hay=((w.region||'')+' '+(w.subRegion||'')+' '+(w.wineName||'')).toLowerCase();for(const r of FR){for(const k of r.kw){if(hay.includes(k))return r.k;}}return null;}
function countryOf(w){const hay=((w.country||'')+' '+(w.region||'')+' '+(w.subRegion||'')).toLowerCase();for(const c of WORLD){for(const a of c.al){if(hay.includes(a))return c.k;}}return null;}
function frCounts(){const m={};st.wines.forEach(w=>{const k=frRegionOf(w);if(k)m[k]=(m[k]||0)+num(w.quantity);});return m;}
function worldCounts(){const m={};st.wines.forEach(w=>{const k=countryOf(w);if(k)m[k]=(m[k]||0)+num(w.quantity);});return m;}

    <textarea id="dlgin" rows="${o.rows||3}" placeholder="${esc(o.placeholder||'')}">${esc(o.value||'')}</textarea>

  document.getElementById('dlgx').onclick=closeModal;
  document.getElementById('dlgok').onclick=()=>{const v=inp.value;closeModal();o.onOk&&o.onOk(v);};

function render(){
  document.querySelectorAll('.nav button[data-tab]').forEach(b=>b.classList.toggle('on',b.dataset.tab===st.tab));
  const m=document.getElementById('main');
  if(!CFG){m.innerHTML='';connect(false);return;}
  if(!st.loaded){m.innerHTML='<div class="sec" style="display:flex;align-items:center;gap:12px;color:var(--muted)"><span class="spin"></span> กำลังเปิดห้องไวน์…</div>';return;}
  m.innerHTML={atlas:viewAtlas,cellar:viewCellar,add:viewAdd,all:viewAll,journal:viewJournal,detail:viewDetail,tasted:viewTasted,prices:viewPrices}[st.tab]();
  if(st.offline)m.insertAdjacentHTML('afterbegin','<div class="offbar">⚠ ออฟไลน์ / เชื่อมต่อหลังบ้านไม่ได้ — กำลังแสดงข้อมูลล่าสุดที่บันทึกไว้ การแก้ไขอาจยังไม่ถูกบันทึก</div>');
  bind();
}

function viewAtlas(){
  const ws=st.wines;
  if(!ws.length)return `<section class="sec"><div class="eyebrow">Bienvenue</div><h1 class="display">Une cave <em>vide</em>.</h1><p class="lede">เริ่มต้นด้วยการถ่ายรูปขวดแรก แล้วให้ผู้ช่วยอ่านฉลากกรอกข้อมูลให้</p><div style="margin-top:30px"><button class="btn fill" data-go="add">Ajouter une bouteille</button></div></section>`;
  const total=ws.reduce((s,w)=>s+num(w.quantity),0);
  const labels=ws.filter(w=>num(w.quantity)>0).length;
  const countries=new Set(ws.map(countryOf).filter(Boolean)).size;
  const regions=new Set(ws.map(frRegionOf).filter(Boolean)).size;
  const soon=ws.filter(isSoon);
  const invested=ws.reduce((s,w)=>s+num(w.price)*num(w.quantity),0);
  return `<section class="sec">
    <div class="eyebrow">La Collection</div>
    <h1 class="display">L'<em>Atlas</em> du vin</h1>
    <p class="lede">ภาพรวมคอลเลกชันของคุณ และต้นกำเนิดของไวน์แต่ละขวดบนแผนที่</p>
    <div class="stats">
      <div class="stat"><div class="n">${total}</div><div class="l">Bouteilles</div></div>
      <div class="stat"><div class="n">${labels}</div><div class="l">Étiquettes</div></div>
      <div class="stat"><div class="n">${countries||'—'}</div><div class="l">Pays</div></div>
      <div class="stat"><div class="n">${regions||'—'}</div><div class="l">Régions FR</div></div>
    </div>
    ${invested?`<div class="invest">เงินลงทุนรวม (ตามราคาซื้อ) · <b>฿${invested.toLocaleString()}</b></div>`:''}
    ${soon.length?`<div class="peak">
      <div class="peak-h"><span>À boire · ควรเปิดเร็ว</span><span class="peak-n">${soon.length}</span></div>
      <div class="peak-list">${soon.slice(0,8).map(w=>`<button class="peak-chip" data-shelf="${w.shelf}"><b>${esc(w.producer)||'—'}</b> ${esc(w.wineName)} <i>${w.vintage||'NV'}</i></button>`).join('')}</div>
    </div>`:''}
    <div class="atlas-head">
      <h2>Origines</h2>
      <div class="toggle"><button data-map="fr" class="${st.mapMode==='fr'?'on':''}">France</button><button data-map="world" class="${st.mapMode==='world'?'on':''}">Le Monde</button></div>
    </div>
    ${st.mapMode==='fr'?mapFrance():mapWorld()}
    ${insights()}
    ${healthBlock()}
    ${backupBlock()}
  </section>`;
}
function healthBlock(){
  const live=st.wines.filter(w=>num(w.quantity)>0);
  const noPhoto=live.filter(w=>!imgSrc(w)).length;
  const noPrice=live.filter(w=>!num(w.price)).length;
  const noSlot=live.filter(w=>!num(w.col)).length;
  if(!noPhoto&&!noPrice&&!noSlot)return '';
  const chip=(n,kind,label)=>n?`<button class="hchip" data-need="${kind}"><b>${n}</b> ${label}</button>`:'';
  return `<div class="atlas-head" style="margin-top:54px"><h2>ความครบของข้อมูล</h2></div>
    <p class="muted" style="font-size:13px;margin:0 0 14px">แตะเพื่อไปแก้ในหน้า Collection</p>
    <div class="hchips">${chip(noPhoto,'nophoto','ยังไม่มีรูป')}${chip(noPrice,'noprice','ยังไม่ลงราคาซื้อ')}${chip(noSlot,'noslot','ยังไม่จัดช่อง')}</div>`;
}
function backupBlock(){
  const last=Number(localStorage.getItem('lacave_lastbackup')||0);
  const days=last?Math.floor((Date.now()-last)/86400000):999;
  if(days<30)return '';
  return `<div class="bkbar"><span>${last?('สำรองข้อมูลล่าสุด '+days+' วันก่อน'):'ยังไม่เคยสำรองข้อมูล'} — ควรกด Backup เก็บไฟล์ไว้</span><button class="btn" id="bknow">⤓ Backup เลย</button></div>`;
}

function bars(title,pairs,total){
  if(!pairs.length)return '';
  const max=Math.max(1,...pairs.map(p=>p[1]));
  return `<div class="ins-col"><h4>${title}</h4>${pairs.map(([n,v])=>`<div class="ins-row"><span class="ins-l">${esc(n)}</span><span class="ins-t"><span class="ins-f" style="width:${v/max*100}%"></span></span><span class="ins-v">${v}</span></div>`).join('')}</div>`;

function insights(){
  const ws=st.wines;
  const byType={},byDec={};
  ws.forEach(w=>{const q=num(w.quantity);
    const t=TYPE[w.type]||'Other';byType[t]=(byType[t]||0)+q;
    if(w.vintage){const d=Math.floor(num(w.vintage)/10)*10;if(d)byDec[d+'s']=(byDec[d+'s']||0)+q;}});
  const types=Object.entries(byType).sort((a,b)=>b[1]-a[1]);
  const decs=Object.entries(byDec).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!types.length)return '';
  return `<div class="atlas-head" style="margin-top:54px"><h2>Aperçu</h2></div>
    <div class="ins">${bars('ตามสไตล์ · Style',types)}${decs.length?bars('ตามทศวรรษ · Décennie',decs):''}</div>`;
}

function mapFrance(){

  const present=FR.filter(r=>c[r.k]).sort((a,b)=>c[b.k]-c[a.k]);
  const chips=present.length?present.map(r=>`<button class="chip" data-msel="${r.k}|${esc(r.n)}|${c[r.k]}"><b>${esc(r.n)}</b><i>${c[r.k]}</i></button>`).join(''):'<span class="muted">ยังไม่มีไวน์ฝรั่งเศสที่ระบุภูมิภาคได้ — แตะจุดบนแผนที่เพื่อดูข้อมูล terroir</span>';
  const allChips=FR.map(r=>`<button class="chip ${c[r.k]?'':'dim'}" data-msel="${r.k}|${esc(r.n)}|${c[r.k]||0}"><b>${esc(r.n)}</b>${c[r.k]?`<i>${c[r.k]}</i>`:''}</button>`).join('');

  return `<div class="mapcard">
    ${sel?`<div class="mapsel"><b>${esc(sel.n)}</b>${sel.c&&sel.c!=='0'?' · '+sel.c+' ขวด':''}</div>`:''}
    <svg viewBox="0 0 100 100" role="img" aria-label="Carte de France des vins">
      <path class="fr-outline" d="${FR_PATH}"/>
      <ellipse class="fr-outline" cx="89" cy="76" rx="3.4" ry="5.5"/>
      ${FR.map(r=>{const n=c[r.k]||0;const has=n>0;const rad=has?(1.6+Math.sqrt(n/max)*4.2):1.5;return `${has?`<circle class="dot-ring" cx="${r.x}" cy="${r.y}" r="${rad+2}"/>`:''}<circle class="dot ${has?'':'empty'} ${sel&&sel.k===r.k?'asel':''}" cx="${r.x}" cy="${r.y}" r="${rad}" data-msel="${r.k}|${esc(r.n)}|${n}"/>`;}).join('')}
    </svg>
  </div>
  ${info?`<div class="terroir">
    <div class="terroir-h"><span class="eyebrow" style="margin:0">Terroir</span><h3>${esc(sel.n)}</h3></div>
    <div class="terroir-grid">
      <div><span>ดิน · Sol</span><p>${esc(info.soil)}</p></div>
      <div><span>ภูมิอากาศ · Climat</span><p>${esc(info.climate)}</p></div>
      <div><span>แสงแดด · Soleil</span><p>${esc(info.sun)}</p></div>
      <div><span>องุ่นเด่น · Cépages</span><p>${esc(info.grapes)}</p></div>
    </div>
    <div class="terroir-notes"><span>เทสติ้งโน้ต · Profil</span><p>${esc(info.notes)}</p></div>
  </div>`:''}
  <div class="legend">${allChips}</div>`;
}

function mapWorld(){

  const grat=[10,20,30,40].map(y=>`<line class="grat" x1="0" y1="${y}" x2="100" y2="${y}"/>`).join('')+[20,40,60,80].map(x=>`<line class="grat" x1="${x}" y1="0" x2="${x}" y2="50"/>`).join('');

function viewCellar(){
  const cab=st.activeCab;
  const ws=st.wines.filter(w=>num(w.quantity)>0&&cabOf(w)===cab);
  const colorOf=t=>({red:'#7E1227',white:'#D8B45A',sparkling:'#E0CC7E',rose:'#E59C9C',dessert:'#B07A35',fortified:'#8A3417',orange:'#D9883A'}[t]||'#B8AE9C');
  const PER=22;
  const zones=SHELVES.map(s=>{
    const list=ws.filter(w=>num(w.shelf)===s.id);
    let n=Math.max(PER,...list.map(w=>num(w.col)||0),list.length);
    const slots=new Array(n).fill(null);
    list.filter(w=>num(w.col)>=1&&num(w.col)<=n).forEach(w=>{const idx=num(w.col)-1;if(!slots[idx])slots[idx]=w;else{const f=slots.indexOf(null);if(f>-1)slots[f]=w;}});
    list.filter(w=>!(num(w.col)>=1)).forEach(w=>{const f=slots.indexOf(null);if(f>-1)slots[f]=w;else slots.push(w);});
    const cnt=list.reduce((a,w)=>a+num(w.quantity),0);

      :`<button class="cc" data-place="${s.id}:${i+1}" title="วางขวดที่ช่องนี้"></button>`).join('');
    return `<div class="cz"><div class="cz-lab"><b>${s.id}</b> ${s.th} <i>${cnt}</i></div><div class="cz-slots">${cells}</div></div>`;

    </div>
    <p class="lede">${esc(CAB_NAMES[cab]||('Cave '+cab))} · ${totalCab} ขวด — วงกลมทึบคือขวดที่มี (แตะดูรายละเอียด) วงกลมจางคือช่องว่าง (แตะเพื่อเลือกขวดมาวาง)</p>
    <div class="cab3">

      <div class="cab3-ov">${zones}</div>
    </div>
    <div class="caleg">
      ${Object.entries({red:'Red',white:'White',sparkling:'Sparkling',rose:'Rosé',dessert:'Dessert',fortified:'Fortified'}).map(([k,l])=>`<span class="legi"><span class="cc full" style="--c:${colorOf(k)};position:static;width:13px;height:13px"></span>${l}</span>`).join('')}

async function onTFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  st.tadd.status='reading';st.tadd.err='';render();
  try{
    st.tadd.photo=await compress(f,900,0.75);st.tadd.thumb=await compress(f,300,0.5);
    const forAI=await compress(f,1200,0.8);
    const mk=ai=>({...tEmpty(),producer:ai.producer||'',wineName:ai.wineName||'',vintage:ai.vintage==null?'':String(ai.vintage),country:ai.country||'',region:ai.region||'',grape:ai.grape||'',type:ai.type||'red',marketPrice:ai.marketPrice||''});
    try{const r=await apiPost({action:'readLabel',image:forAI});
      const arr=((r.data&&r.data.bottles)||(r.data?[r.data]:[])).filter(Boolean);
      const forms=(arr.length?arr:[{}]).map(mk);
      st.tadd.form=forms[0];st.tadd.queue=forms.slice(1);
    }catch(e){st.tadd.form=tEmpty();st.tadd.queue=[];st.tadd.err='อ่านฉลากไม่สำเร็จ กรอกเองได้เลย';}
    st.tadd.status='review';
  }catch(e){st.tadd.status='idle';st.tadd.err='เปิดรูปไม่สำเร็จ';}
  render();
}
async function saveTasted(){
  const f=st.tadd.form;const item={id:nid(),producer:f.producer,wineName:f.wineName,vintage:f.vintage?Number(f.vintage):'',country:f.country,region:f.region,grape:f.grape,type:f.type,rating:Number(f.rating)||0,wishlist:!!f.wishlist,where:f.where,note:f.note,marketPrice:f.marketPrice||'',photo:'',addedAt:Date.now()};
  const btn=document.getElementById('tsave');if(btn){btn.disabled=true;btn.textContent='กำลังบันทึก…';}
  try{const r=await apiPost({action:'tastedAdd',item,image:st.tadd.thumb});st.tasted.unshift(r.item);saveCache();
    const q=st.tadd.queue||[];
    if(q.length){const next=q.shift();st.tadd.form=next;st.tadd.status='review';toast('บันทึกแล้ว · เหลืออีก '+(q.length+1)+' ขวด');render();}

function mktNum(s){if(!s)return 0;const m=String(s).replace(/,/g,'').match(/\d+(\.\d+)?/g);if(!m)return 0;const n=m.map(Number);return n.length>=2?(n[0]+n[1])/2:n[0];}
function viewAll(){
  const all=st.wines;
  if(!all.length)return '<section class="sec"><div class="eyebrow">Collection</div><h1 class="display">La <em>Collection</em></h1><p class="empty" style="margin-top:20px">ยังไม่มีไวน์ในคลัง</p></section>';
  const F=st.filt;
  const countries=[...new Set(all.map(w=>w.country).filter(Boolean))].sort();
  let rows=all.filter(w=>{
    if(q&&![w.producer,w.wineName,w.country,w.region,w.subRegion,w.grape,w.vintage].join(' ').toLowerCase().includes(q.toLowerCase()))return false;
    if(F.type&&w.type!==F.type)return false;
    if(F.country&&w.country!==F.country)return false;
    if(F.cab&&cabOf(w)!==Number(F.cab))return false;
    if(F.ow&&oldNew(w)!==F.ow)return false;
    if(F.status==='soon'&&!isSoon(w))return false;
    if(F.status==='single'&&num(w.quantity)!==1)return false;
    if(F.status==='out'&&num(w.quantity)>0)return false;
    if(F.need==='nophoto'&&imgSrc(w))return false;
    if(F.need==='noprice'&&num(w.price))return false;
    if(F.need==='noslot'&&num(w.col))return false;
    return true;
  });
  const cmp={recent:(a,b)=>(b.addedAt||0)-(a.addedAt||0),score:(a,b)=>num(b.score)-num(a.score),vintage:(a,b)=>(num(a.vintage)||9999)-(num(b.vintage)||9999),producer:(a,b)=>String(a.producer||'').localeCompare(String(b.producer||'')),price:(a,b)=>num(b.price)-num(a.price)};
  rows=[...rows].sort(cmp[sortK]);
  const invested=rows.reduce((s,w)=>s+num(w.price)*num(w.quantity),0);
  const market=rows.reduce((s,w)=>s+mktNum(w.marketPrice)*num(w.quantity),0);
  const delta=market-invested;
  const qty=rows.reduce((s,w)=>s+num(w.quantity),0);
  const opt=(cur,val,lbl)=>`<option value="${val}" ${cur===val?'selected':''}>${lbl}</option>`;
  return `<section class="sec">
    <div class="eyebrow">${all.length} Étiquettes · ${rows.length} แสดงอยู่</div>
    <h1 class="display">La <em>Collection</em></h1>
    ${(invested||market)?`<div class="money">
      <div class="mi"><span>เงินลงทุน</span><b>฿${invested.toLocaleString()}</b></div>
      <div class="mi"><span>มูลค่าตลาด ~</span><b>฿${Math.round(market).toLocaleString()}</b></div>
      <div class="mi"><span>กำไร/ขาดทุน ~</span><b class="${delta>=0?'up':'down'}">${delta>=0?'+':'−'}฿${Math.abs(Math.round(delta)).toLocaleString()}</b></div>
      <div class="mi"><span>รวม</span><b>${qty} ขวด</b></div>
    </div>`:''}
    <div class="ctrls">
      <input class="srch" id="srch" placeholder="ค้นหา producer, ภูมิภาค, องุ่น…" value="${esc(q)}">
      <div class="vtoggle"><button class="${!st.colView?'on':''}" id="vtable">☰ ตาราง</button><button class="${st.colView?'on':''}" id="vcards">▦ การ์ด</button></div>
      <button class="btn" id="export" style="padding:9px 16px;font-size:11px">⤓ Backup</button>
    </div>
    <div class="filters">
      <select data-filt="type"><option value="">ทุกชนิด</option>${Object.entries(TYPE).map(([v,l])=>opt(F.type,v,l)).join('')}</select>
      <select data-filt="country"><option value="">ทุกประเทศ</option>${countries.map(c=>opt(F.country,c,esc(c))).join('')}</select>
      <select data-filt="cab"><option value="">ทุกตู้</option>${CABINETS.map(c=>opt(F.cab,String(c),esc(CAB_NAMES[c]||('Cave '+c)))).join('')}</select>
      <select data-filt="ow"><option value="">Old/New</option>${opt(F.ow,'Old World','Old World')}${opt(F.ow,'New World','New World')}</select>
      <select data-filt="status"><option value="">สถานะทั้งหมด</option>${opt(F.status,'soon','ถึงพีค')}${opt(F.status,'single','เหลือขวดเดียว')}${opt(F.status,'out','หมดแล้ว')}</select>
      <div class="sortbar">${[['recent','ล่าสุด'],['score','คะแนน'],['vintage','ปี'],['price','ราคา']].map(([k,l])=>`<button class="${sortK===k?'on':''}" data-sort="${k}">${l}</button>`).join('')}</div>
      ${(F.type||F.country||F.cab||F.ow||F.status||F.need)?'<button class="link" id="fclear">ล้างตัวกรอง</button>':''}
      ${F.need?`<span class="needtag">${({nophoto:'ยังไม่มีรูป',noprice:'ยังไม่ลงราคา',noslot:'ยังไม่จัดช่อง'})[F.need]}</span>`:''}
    </div>
    ${st.colView
      ? `<div class="cards" style="margin-top:24px">${rows.map(cardHtml).join('')}</div>`
      : `<div class="tbl"><div class="tr th"><span>Bouteille</span><span>Mill.</span><span>Origine</span><span>Score</span><span>Site</span><span>Qté</span><span></span></div>
    ${rows.map(w=>`<div class="tr"><span class="tb" data-open="${w.id}" style="cursor:pointer">${imgSrc(w)?`<img src="${imgSrc(w)}" loading="lazy" alt="">`:'<span class="none">✦</span>'}<span><b>${esc(w.producer)||'—'}</b><br><span class="muted">${esc(w.wineName)}</span></span></span>
      <span>${w.vintage||'NV'}</span><span class="muted">${[w.region,w.country].filter(Boolean).map(esc).join(', ')||'—'}</span><span>${esc(w.score)||'—'}</span><span>Site ${w.shelf}</span>
      <span class="qty"><button data-q="-1" data-id="${w.id}">−</button><span>${w.quantity}</span><button data-q="1" data-id="${w.id}">+</button></span>
      <span><button class="del" data-del="${w.id}">✕</button></span></div>`).join('')}</div>`}
  </section>`;
}

function readFileAsDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function parseSheet(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});let out='';wb.SheetNames.forEach(n=>{out+='# '+n+'\n'+XLSX.utils.sheet_to_csv(wb.Sheets[n])+'\n';});res(out);}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(f);});}
function onPriceFile(input){const f=input.files&&input.files[0];if(f)onPriceFileF(f);}
async function onPriceFileF(f){
  if(!f)return;
  st.padd={status:'reading',err:'',rows:null,listName:f.name.replace(/\.[^.]+$/,''),fileLabel:f.name};render();
  try{
    let payload;
    const name=(f.name||'').toLowerCase();
    if(/\.(xlsx|xls|csv|tsv)$/.test(name)){
      if(typeof XLSX==='undefined')throw new Error('ตัวอ่าน Excel ยังโหลดไม่เสร็จ ลองรีเฟรชหน้าแล้วลองใหม่');
      payload={text:await parseSheet(f)};
    }else if(f.type==='application/pdf'||/\.pdf$/.test(name)){
      payload={pdf:await readFileAsDataURL(f)};
    }else if((f.type||'').startsWith('image/')||/\.(jpe?g|png|webp|heic|heif)$/.test(name)){
      payload={image:await compress(f,1600,0.85)};
    }else{throw new Error('ชนิดไฟล์นี้ยังไม่รองรับ (รองรับ รูป/PDF/Excel/CSV)');}
    const r=await apiPost({action:'readPricelist',...payload});
    const rows=(r.rows||[]).map(x=>({producer:x.producer||'',wineName:x.wineName||'',vintage:x.vintage==null?'':String(x.vintage),price:x.price==null?'':String(x.price),currency:x.currency||'THB',note:x.note||''}));
    if(!rows.length)throw new Error('AI อ่านไม่พบรายการราคาในไฟล์นี้ — ลองไฟล์ที่ชัดกว่า หรือกรอกเอง');
    st.padd.rows=rows;st.padd.status='review';
  }catch(e){
    let msg=e.message||'ผิดพลาด';
    if(/unknown action/i.test(msg))msg='ยังไม่ได้ Deploy หลังบ้านเวอร์ชันใหม่ — ไปที่ Apps Script ▸ Deploy ▸ Manage deployments ▸ Edit ▸ New version ▸ Deploy แล้วลองใหม่';
    st.padd={status:'idle',err:msg,rows:null,listName:'',fileLabel:''};
  }
  render();
}

async function sendChat(text){
  text=(text||'').trim();if((!text&&!st.chat.img)||st.chat.busy)return;
  const msg={role:'user',text};if(st.chat.img)msg.image=st.chat.img;
  st.chat.msgs.push(msg);st.chat.img=null;st.chat.busy=true;mountChat();
  const payload=st.chat.msgs.map((m,i)=>i===st.chat.msgs.length-1?m:{role:m.role,text:m.text});
  try{
    const r=await apiPost({action:'chat',messages:payload});
    st.chat.msgs.push({role:'assistant',text:r.reply||'ขออภัยครับ ตอบไม่ได้ในตอนนี้'});
  }catch(e){st.chat.msgs.push({role:'assistant',text:'ขออภัยครับ มีปัญหาในการเชื่อมต่อ ('+e.message+')'});}
  st.chat.busy=false;mountChat();
}

if(CFG){if(loadCache())st.loaded=true;load();mountChat();}else render();
</script>
</body>
</html>
