<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LA CAVE — Private Cellar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap');

:root{
  --ink:#0E0B0C; --panel:#161012; --panel2:#1C1418; --line:#332428;
  --bord:#5A0D1E; --gold:#C9A227; --gold-soft:#B8902E; --gold-dim:#7d6326;
  --cream:#EBE2D4; --taupe:#9A8C7E; --warn:#E0853C;
}
*{box-sizing:border-box;}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%, #1d1216 0%, var(--ink) 55%);
  color:var(--cream);min-height:100vh;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}

/* header */
.lc-head{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
  background:linear-gradient(to bottom, rgba(14,11,12,.92), rgba(14,11,12,.78));border-bottom:1px solid var(--line);}
.lc-head-inner{max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.lc-brand{display:flex;align-items:center;gap:12px;}
.lc-mark{color:var(--gold);font-size:20px;}
.lc-brand-name{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:26px;letter-spacing:.22em;line-height:1;}
.lc-brand-sub{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe);margin-top:4px;}
.lc-nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.lc-nav-btn{background:none;border:none;color:var(--taupe);font-family:inherit;font-size:12.5px;letter-spacing:.08em;
  text-transform:uppercase;padding:8px 12px;cursor:pointer;border-radius:2px;transition:color .2s;position:relative;}
.lc-nav-btn:hover{color:var(--cream);}
.lc-nav-btn.is-active{color:var(--gold);}
.lc-nav-btn.is-active::after{content:"";position:absolute;left:12px;right:12px;bottom:2px;height:1px;background:var(--gold);}
.lc-gear{background:none;border:1px solid var(--line);color:var(--taupe);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:13px;}
.lc-gear:hover{color:var(--gold);border-color:var(--gold-dim);}

.lc-main{max-width:1080px;margin:0 auto;padding:40px 24px 64px;}
.lc-section{animation:fade .5s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lc-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:14px;}
.lc-h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(30px,5vw,46px);line-height:1.05;margin:0 0 10px;}
.lc-h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;margin:36px 0 14px;}
.lc-h2.lc-tight{margin:2px 0 0;}
.lc-lede{color:var(--taupe);font-size:15px;line-height:1.6;max-width:60ch;margin:0 0 8px;}
.lc-muted{color:var(--taupe);}

.lc-hero{display:flex;align-items:baseline;gap:18px;margin:8px 0 28px;padding-bottom:24px;border-bottom:1px solid var(--line);}
.lc-hero-num{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(64px,16vw,128px);line-height:.85;color:var(--gold);letter-spacing:-.02em;}
.lc-hero-label{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);padding-bottom:14px;}
.lc-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px;}
.lc-stat{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:18px;}
.lc-stat.is-accent{border-color:var(--gold-dim);background:linear-gradient(var(--panel),#1d1310);}
.lc-stat-v{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;line-height:1;}
.lc-stat-suffix{font-size:15px;color:var(--taupe);margin-left:3px;}
.lc-stat-k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);margin-top:8px;}

.lc-alert{display:flex;gap:12px;align-items:center;margin:24px 0;padding:14px 16px;border:1px solid var(--gold-dim);
  border-left:3px solid var(--gold);border-radius:4px;background:linear-gradient(90deg, rgba(201,162,39,.07), transparent);}
.lc-alert-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);white-space:nowrap;font-weight:600;}
.lc-alert-text{font-family:'Cormorant Garamond',serif;font-size:18px;}

.lc-bars{display:flex;flex-direction:column;gap:2px;}
.lc-bar-row{display:grid;grid-template-columns:200px 1fr 36px;align-items:center;gap:14px;background:none;border:none;
  border-bottom:1px solid var(--line);padding:11px 0;cursor:pointer;color:var(--cream);text-align:left;font-family:inherit;transition:padding-left .2s;}
.lc-bar-row:hover{padding-left:6px;}
.lc-bar-name{font-size:13px;color:var(--taupe);}
.lc-bar-name b{color:var(--cream);font-weight:600;margin-right:6px;font-family:'Cormorant Garamond',serif;font-size:15px;}
.lc-bar-track{height:6px;background:#241a1d;border-radius:3px;overflow:hidden;}
.lc-bar-fill{display:block;height:100%;background:linear-gradient(90deg,var(--bord),var(--gold));border-radius:3px;}
.lc-bar-val{font-family:'Cormorant Garamond',serif;font-size:18px;text-align:right;}
.lc-split{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
.lc-break{display:flex;flex-direction:column;gap:9px;}
.lc-break-row{display:grid;grid-template-columns:120px 1fr 28px;align-items:center;gap:10px;font-size:13px;}
.lc-break-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-break-track{height:4px;background:#241a1d;border-radius:2px;overflow:hidden;}
.lc-break-fill{display:block;height:100%;background:var(--gold-dim);border-radius:2px;}
.lc-break-n{text-align:right;color:var(--taupe);}

/* cabinet */
.lc-cabinet{margin:26px auto;max-width:620px;}
.lc-cab-frame{border:2px solid var(--gold-dim);border-radius:8px 8px 0 0;padding:10px;background:linear-gradient(145deg,#120c0e,#1a1013);
  box-shadow:0 30px 60px -30px rgba(0,0,0,.9), inset 0 0 0 1px rgba(201,162,39,.06);display:flex;flex-direction:column;gap:8px;}
.lc-shelf{position:relative;display:grid;grid-template-columns:150px 1fr 44px;align-items:center;gap:14px;min-height:74px;
  padding:12px 16px;border:1px solid var(--line);border-radius:4px;cursor:pointer;background:linear-gradient(180deg,#1b1216,#140d10);
  overflow:hidden;text-align:left;font-family:inherit;color:var(--cream);transition:transform .2s, border-color .2s;}
.lc-shelf:hover{border-color:var(--gold-dim);transform:translateX(2px);}
.lc-shelf.is-open{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
.lc-shelf-glow{position:absolute;left:0;right:0;bottom:0;height:40%;background:radial-gradient(80% 120% at 50% 120%, rgba(201,162,39,.22), transparent 70%);pointer-events:none;}
.lc-shelf-info{display:flex;flex-direction:column;gap:1px;z-index:1;}
.lc-shelf-site{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);}
.lc-shelf-title{font-family:'Cormorant Garamond',serif;font-size:19px;line-height:1.05;}
.lc-shelf-th{font-size:11px;color:var(--taupe);}
.lc-shelf-bottles{display:flex;align-items:flex-end;gap:3px;height:38px;z-index:1;overflow:hidden;}
.lc-bottle{width:7px;height:30px;border-radius:3px 3px 1px 1px;background:linear-gradient(180deg,#3a0f1c,#5A0D1E 40%,#7d1228);box-shadow:inset 0 6px 4px -4px rgba(255,255,255,.25);}
.lc-shelf-more{font-size:11px;color:var(--taupe);align-self:center;margin-left:4px;}
.lc-shelf-count{font-family:'Cormorant Garamond',serif;font-size:26px;text-align:right;color:var(--gold);z-index:1;}
.lc-cab-base{height:14px;margin:0 14px;border-radius:0 0 10px 10px;background:linear-gradient(180deg,#0d0809,#070506);border:2px solid var(--gold-dim);border-top:none;box-shadow:0 20px 30px -20px #000;}

.lc-panel{margin-top:30px;border-top:1px solid var(--line);padding-top:20px;}
.lc-panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.lc-link{background:none;border:none;color:var(--gold-soft);cursor:pointer;font-family:inherit;font-size:13px;}
.lc-link:hover{color:var(--gold);}
.lc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.lc-card{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:14px;}
.lc-card-photo{width:64px;flex-shrink:0;}
.lc-card-photo img{width:64px;height:96px;object-fit:cover;border-radius:3px;border:1px solid var(--line);}
.lc-card-noimg{width:64px;height:96px;display:flex;align-items:center;justify-content:center;background:#120c0e;border:1px solid var(--line);border-radius:3px;color:var(--gold-dim);font-size:22px;}
.lc-card-body{flex:1;min-width:0;}
.lc-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.lc-card-producer{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);}
.lc-score{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);line-height:1;}
.lc-card-name{font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.1;margin:2px 0 6px;}
.lc-vint{color:var(--gold-soft);}
.lc-card-meta{font-size:12px;color:var(--taupe);margin-bottom:8px;line-height:1.4;}
.lc-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.lc-tag{font-size:10.5px;padding:3px 8px;border-radius:99px;border:1px solid var(--gold-dim);color:var(--gold-soft);}
.lc-tag-soft{border-color:var(--line);color:var(--taupe);}
.lc-tag-warn{border-color:var(--warn);color:var(--warn);}
.lc-card-foot{display:flex;justify-content:space-between;align-items:center;}
.lc-qty{display:flex;align-items:center;gap:10px;}
.lc-qty button{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:#120c0e;color:var(--cream);font-size:16px;cursor:pointer;line-height:1;}
.lc-qty button:hover{border-color:var(--gold-soft);color:var(--gold);}
.lc-qty span{font-family:'Cormorant Garamond',serif;font-size:18px;min-width:18px;text-align:center;}
.lc-qty-sm button{width:22px;height:22px;font-size:14px;}
.lc-del{background:none;border:none;color:var(--taupe);font-size:12px;cursor:pointer;}
.lc-del:hover{color:var(--warn);}

.lc-add-grid{display:grid;grid-template-columns:300px 1fr;gap:30px;margin-top:24px;align-items:start;}
.lc-drop{display:flex;flex-direction:column;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:20px;position:sticky;top:90px;}
.lc-drop-img{width:100%;max-height:300px;object-fit:contain;border-radius:4px;}
.lc-drop-placeholder{width:100%;height:220px;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;border:1px dashed var(--line);border-radius:4px;color:var(--taupe);font-size:13px;}
.lc-drop-mark{font-size:34px;color:var(--gold-dim);}
.lc-reading{display:flex;align-items:center;gap:8px;color:var(--taupe);font-size:13px;}
.lc-spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lc-conf{font-size:11px;letter-spacing:.06em;text-transform:uppercase;}
.lc-conf-high{color:#7bbf7b;}.lc-conf-medium{color:var(--gold-soft);}.lc-conf-low{color:var(--warn);}
.lc-warn{font-size:12.5px;color:var(--warn);text-align:center;line-height:1.5;}

.lc-btn{font-family:inherit;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:12px 18px;border-radius:3px;cursor:pointer;border:1px solid var(--gold-dim);background:none;color:var(--gold);transition:background .2s;}
.lc-btn:hover{background:rgba(201,162,39,.1);}
.lc-btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold-soft));color:#1a1206;border:none;font-weight:600;}
.lc-btn-gold:hover{filter:brightness(1.08);}
.lc-btn-full{width:100%;margin-top:8px;}
.lc-btn[disabled]{opacity:.5;cursor:default;}

.lc-form{display:flex;flex-direction:column;gap:14px;}
.lc-frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.lc-field{display:flex;flex-direction:column;gap:6px;}
.lc-field-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);}
.lc-field input,.lc-field select,.lc-field textarea,.lc-search,.lc-conn input{
  background:#120c0e;border:1px solid var(--line);border-radius:3px;color:var(--cream);padding:10px 12px;font-family:inherit;font-size:14px;width:100%;}
.lc-field input:focus,.lc-field select:focus,.lc-field textarea:focus,.lc-search:focus,.lc-conn input:focus{
  outline:none;border-color:var(--gold-soft);box-shadow:0 0 0 2px rgba(201,162,39,.12);}
.lc-field textarea{resize:vertical;}
.lc-check{display:flex;align-items:center;gap:9px;font-size:13.5px;cursor:pointer;}
.lc-check input{width:16px;height:16px;accent-color:var(--gold);}

.lc-controls{display:flex;gap:14px;align-items:center;margin:20px 0;flex-wrap:wrap;}
.lc-search{max-width:340px;}
.lc-sort{display:flex;gap:4px;}
.lc-sort-btn{background:none;border:1px solid var(--line);color:var(--taupe);font-family:inherit;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-radius:3px;cursor:pointer;}
.lc-sort-btn:hover{color:var(--cream);}
.lc-sort-btn.is-active{color:var(--gold);border-color:var(--gold-dim);}
.lc-table{display:flex;flex-direction:column;}
.lc-tr{display:grid;grid-template-columns:2.4fr .7fr 1.6fr .6fr .7fr .9fr .4fr;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--line);font-size:13.5px;}
.lc-th{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);border-bottom:1px solid var(--gold-dim);}
.lc-td-bottle{display:flex;align-items:center;gap:10px;}
.lc-td-bottle img{width:30px;height:44px;object-fit:cover;border-radius:2px;border:1px solid var(--line);}
.lc-td-noimg{width:30px;height:44px;display:flex;align-items:center;justify-content:center;background:#120c0e;border:1px solid var(--line);border-radius:2px;color:var(--gold-dim);}
.lc-td-bottle b{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;}

.lc-foot{text-align:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);padding:24px;border-top:1px solid var(--line);}

/* connect / settings overlay */
.lc-overlay{position:fixed;inset:0;background:rgba(8,6,7,.82);backdrop-filter:blur(6px);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;}
.lc-conn{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--gold-dim);border-radius:8px;padding:32px;}
.lc-conn h2{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;margin:0 0 6px;}
.lc-conn p{color:var(--taupe);font-size:13px;line-height:1.6;margin:0 0 20px;}
.lc-conn label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);margin:14px 0 6px;}

@media (max-width:760px){
  .lc-stat-row{grid-template-columns:1fr;}
  .lc-split{grid-template-columns:1fr;gap:8px;}
  .lc-add-grid{grid-template-columns:1fr;}
  .lc-drop{position:static;}
  .lc-frow{grid-template-columns:1fr;}
  .lc-bar-row{grid-template-columns:140px 1fr 30px;}
  .lc-shelf{grid-template-columns:120px 1fr 38px;}
  .lc-shelf-bottles{display:none;}
  .lc-tr{grid-template-columns:2fr .7fr .6fr .8fr .4fr;}
  .lc-tr span:nth-child(3),.lc-tr span:nth-child(5){display:none;}
  .lc-head-inner{flex-direction:column;align-items:flex-start;gap:12px;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header class="lc-head">
  <div class="lc-head-inner">
    <div class="lc-brand">
      <span class="lc-mark">✦</span>
      <div>
        <div class="lc-brand-name">LA&nbsp;CAVE</div>
        <div class="lc-brand-sub">Private Cellar · Hier JC-366DZ</div>
      </div>
    </div>
    <nav class="lc-nav">
      <button class="lc-nav-btn" data-tab="overview">Overview</button>
      <button class="lc-nav-btn" data-tab="cellar">The Cellar</button>
      <button class="lc-nav-btn" data-tab="add">Add a Bottle</button>
      <button class="lc-nav-btn" data-tab="all">All Bottles</button>
      <button class="lc-gear" id="gear" title="Settings">⚙</button>
    </nav>
  </div>
</header>

<main class="lc-main" id="main"></main>
<footer class="lc-foot" id="foot">Saved to your Google Sheet.</footer>
<div id="overlay"></div>

<script>
// ── config (kept in this browser only — never committed to GitHub) ───────────
const LS_KEY = 'lacave_config_v1';
let CONFIG = JSON.parse(localStorage.getItem(LS_KEY) || 'null');

const CURRENT_YEAR = new Date().getFullYear();
const SHELVES = [
  {id:1,title:'Sparkling & White',th:'สปาร์กลิง & ไวน์ขาว'},
  {id:2,title:'Sparkling & White',th:'สปาร์กลิง & ไวน์ขาว'},
  {id:3,title:'Grand Vins',th:'ไวน์มูลค่าสูงสุด'},
  {id:4,title:'Modern Era',th:'ไวน์สมัยใหม่'},
  {id:5,title:'Old Vintages',th:'ไวน์ปีเก่า'},
  {id:6,title:'Everyday Pours',th:'ดื่มประจำวัน'},
];
const TYPE_LABEL = {sparkling:'Sparkling',white:'White',red:'Red',rose:'Rosé',dessert:'Dessert',fortified:'Fortified',orange:'Orange',other:'Other'};

const state = { wines:[], tab:'overview', openShelf:null, loaded:false,
  add:{ photoFull:null, status:'idle', err:'', conf:null, form:emptyForm() } };

function emptyForm(){ return {producer:'',wineName:'',vintage:'',country:'',region:'',subRegion:'',grape:'',type:'red',score:'',yearsLeft:'',drinkSoon:false,shelf:3,quantity:1,price:'',notes:''}; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function newId(){ return 'w_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function photoUrl(id,size){ return id ? 'https://drive.google.com/thumbnail?id='+id+'&sz=w'+(size||400) : ''; }

// ── backend calls ────────────────────────────────────────────────────────────
async function apiPost(body){
  const res = await fetch(CONFIG.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({token:CONFIG.token},body))});
  const j = await res.json();
  if(!j.ok) throw new Error(j.error||'request failed');
  return j;
}
async function apiList(){
  const res = await fetch(CONFIG.url+'?action=list&token='+encodeURIComponent(CONFIG.token));
  const j = await res.json();
  if(!j.ok) throw new Error(j.error||'request failed');
  return j.wines||[];
}

async function loadWines(){
  state.loaded=false; render();
  try{ state.wines = await apiList(); }
  catch(e){ state.wines=[]; alert('โหลดข้อมูลไม่สำเร็จ: '+e.message); }
  state.loaded=true; render();
}

// ── image compression ────────────────────────────────────────────────────────
function compress(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };img.onerror=reject;img.src=e.target.result;};
    r.onerror=reject;r.readAsDataURL(file);
  });
}

// ── render ────────────────────────────────────────────────────────────────────
function render(){
  document.querySelectorAll('.lc-nav-btn').forEach(b=>b.classList.toggle('is-active',b.dataset.tab===state.tab));
  const main=document.getElementById('main');
  if(!CONFIG){ main.innerHTML=''; renderConnect(false); return; }
  if(!state.loaded){ main.innerHTML='<div class="lc-section lc-muted">Opening the cellar…</div>'; return; }
  if(state.tab==='overview') main.innerHTML=viewOverview();
  else if(state.tab==='cellar') main.innerHTML=viewCellar();
  else if(state.tab==='add') main.innerHTML=viewAdd();
  else if(state.tab==='all') main.innerHTML=viewAll();
  bind();
}

function aggregate(key,fmt){
  const m={};state.wines.forEach(w=>{const raw=w[key]||'Unknown';const k=fmt?fmt(raw):raw;m[k]=(m[k]||0)+(Number(w.quantity)||0);});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
const isSoon = w => (Number(w.quantity)||0)>0 && (w.drinkSoon || (w.yearsLeft!==''&&w.yearsLeft!=null&&Number(w.yearsLeft)<=1));

function viewOverview(){
  const ws=state.wines;
  if(!ws.length) return `<section class="lc-section"><div class="lc-eyebrow">Welcome</div>
    <h1 class="lc-h1">Your cellar is empty.</h1><p class="lc-lede">เริ่มต้นด้วยการถ่ายรูปขวดแรก แล้วให้ผู้ช่วยอ่านฉลากกรอกข้อมูลให้</p>
    <button class="lc-btn lc-btn-gold" data-go="add">Add your first bottle</button></section>`;
  const total=ws.reduce((s,w)=>s+(Number(w.quantity)||0),0);
  const labels=ws.filter(w=>(Number(w.quantity)||0)>0).length;
  const soon=ws.filter(isSoon);
  const scored=ws.filter(w=>w.score);
  const avg=scored.length?Math.round(scored.reduce((s,w)=>s+Number(w.score),0)/scored.length):null;
  const value=ws.reduce((s,w)=>s+(Number(w.price)||0)*(Number(w.quantity)||0),0);
  const byShelf=SHELVES.map(s=>({...s,count:ws.filter(w=>Number(w.shelf)===s.id).reduce((a,w)=>a+(Number(w.quantity)||0),0)}));
  const maxS=Math.max(1,...byShelf.map(s=>s.count));
  const bd=(items)=>{const t=total||1;return items.map(([n,c])=>`<div class="lc-break-row"><span class="lc-break-name">${esc(n)}</span><span class="lc-break-track"><span class="lc-break-fill" style="width:${c/t*100}%"></span></span><span class="lc-break-n">${c}</span></div>`).join('')||'<p class="lc-muted">No data</p>';};
  return `<section class="lc-section">
    <div class="lc-eyebrow">The Collection at a Glance</div>
    <div class="lc-hero"><div class="lc-hero-num">${total}</div><div class="lc-hero-label">bottles across ${labels} labels</div></div>
    <div class="lc-stat-row">
      <div class="lc-stat"><div class="lc-stat-v">${avg||'—'}<span class="lc-stat-suffix">${avg?'/100':''}</span></div><div class="lc-stat-k">Avg. score</div></div>
      <div class="lc-stat ${soon.length?'is-accent':''}"><div class="lc-stat-v">${soon.length}</div><div class="lc-stat-k">Drink soon</div></div>
      <div class="lc-stat"><div class="lc-stat-v">${value?'฿'+value.toLocaleString():'—'}</div><div class="lc-stat-k">Est. value</div></div>
    </div>
    ${soon.length?`<div class="lc-alert"><span class="lc-alert-tag">Open soon</span><span class="lc-alert-text">${soon.slice(0,4).map(w=>esc([w.producer,w.wineName,w.vintage].filter(Boolean).join(' '))).join(' · ')}${soon.length>4?' +'+(soon.length-4)+' more':''}</span></div>`:''}
    <h2 class="lc-h2">By shelf</h2>
    <div class="lc-bars">${byShelf.map(s=>`<button class="lc-bar-row" data-shelf="${s.id}"><span class="lc-bar-name"><b>Site ${s.id}</b> ${s.th}</span><span class="lc-bar-track"><span class="lc-bar-fill" style="width:${s.count/maxS*100}%"></span></span><span class="lc-bar-val">${s.count}</span></button>`).join('')}</div>
    <div class="lc-split"><div><h2 class="lc-h2">By country</h2><div class="lc-break">${bd(aggregate('country'))}</div></div>
    <div><h2 class="lc-h2">By style</h2><div class="lc-break">${bd(aggregate('type',v=>TYPE_LABEL[v]||v))}</div></div></div>
  </section>`;
}

function viewCellar(){
  const ws=state.wines;
  const counts=SHELVES.map(s=>ws.filter(w=>Number(w.shelf)===s.id).reduce((a,w)=>a+(Number(w.quantity)||0),0));
  const open=state.openShelf?SHELVES.find(s=>s.id===state.openShelf):null;
  const shelfWines=open?ws.filter(w=>Number(w.shelf)===open.id):[];
  return `<section class="lc-section">
    <div class="lc-eyebrow">The Cabinet · 6 Curated Shelves</div>
    <p class="lc-lede">แตะที่ชั้นใดก็ได้เพื่อดูขวดที่จัดเก็บอยู่</p>
    <div class="lc-cabinet"><div class="lc-cab-frame">
      ${SHELVES.map((s,i)=>`<button class="lc-shelf ${state.openShelf===s.id?'is-open':''}" data-shelf="${s.id}">
        <div class="lc-shelf-glow"></div>
        <div class="lc-shelf-info"><span class="lc-shelf-site">Site ${s.id}</span><span class="lc-shelf-title">${s.title}</span><span class="lc-shelf-th">${s.th}</span></div>
        <div class="lc-shelf-bottles">${Array.from({length:Math.min(counts[i],14)}).map(()=>'<span class="lc-bottle"></span>').join('')}${counts[i]>14?'<span class="lc-shelf-more">+'+(counts[i]-14)+'</span>':''}</div>
        <span class="lc-shelf-count">${counts[i]}</span></button>`).join('')}
    </div><div class="lc-cab-base"></div></div>
    ${open?`<div class="lc-panel"><div class="lc-panel-head"><div><span class="lc-eyebrow">Site ${open.id} · ${open.th}</span><h2 class="lc-h2 lc-tight">${open.title}</h2></div><button class="lc-link" data-shelf="${open.id}">Close ✕</button></div>
      ${shelfWines.length?`<div class="lc-cards">${shelfWines.map(cardHtml).join('')}</div>`:'<p class="lc-muted">ยังไม่มีไวน์ในชั้นนี้</p>'}</div>`:''}
  </section>`;
}

function cardHtml(w){
  const age=w.vintage?CURRENT_YEAR-Number(w.vintage):null;
  const tags=[];
  if(w.type) tags.push(`<span class="lc-tag">${TYPE_LABEL[w.type]||w.type}</span>`);
  if(w.grape) tags.push(`<span class="lc-tag lc-tag-soft">${esc(w.grape)}</span>`);
  if(age!=null) tags.push(`<span class="lc-tag lc-tag-soft">${age} yrs old</span>`);
  if(isSoon(w)) tags.push('<span class="lc-tag lc-tag-warn">Drink soon</span>');
  else if(w.yearsLeft!==''&&w.yearsLeft!=null&&Number(w.yearsLeft)>1) tags.push(`<span class="lc-tag lc-tag-soft">~${w.yearsLeft}y to peak</span>`);
  return `<div class="lc-card">
    <div class="lc-card-photo">${w.photoId?`<img src="${photoUrl(w.photoId,200)}" alt="" loading="lazy">`:'<div class="lc-card-noimg">✦</div>'}</div>
    <div class="lc-card-body">
      <div class="lc-card-top"><span class="lc-card-producer">${esc(w.producer)||'Unknown producer'}</span>${w.score?`<span class="lc-score">${esc(w.score)}</span>`:''}</div>
      <div class="lc-card-name">${esc(w.wineName)||'—'} <span class="lc-vint">${w.vintage||'NV'}</span></div>
      <div class="lc-card-meta">${[w.region,w.subRegion,w.country].filter(Boolean).map(esc).join(' · ')}</div>
      <div class="lc-card-tags">${tags.join('')}</div>
      <div class="lc-card-foot"><div class="lc-qty"><button data-qty="-1" data-id="${w.id}">−</button><span>${w.quantity}</span><button data-qty="1" data-id="${w.id}">+</button></div>
      <button class="lc-del" data-del="${w.id}">Remove</button></div>
    </div></div>`;
}

function field(label,key,ph,textarea){
  const v=esc(state.add.form[key]);
  return `<label class="lc-field"><span class="lc-field-label">${label}</span>${textarea?`<textarea rows="2" data-f="${key}" placeholder="${ph||''}">${v}</textarea>`:`<input value="${v}" data-f="${key}" placeholder="${ph||''}">`}</label>`;
}
function select(label,key,options){
  return `<label class="lc-field"><span class="lc-field-label">${label}</span><select data-f="${key}">${options.map(([val,lab])=>`<option value="${val}" ${String(state.add.form[key])===String(val)?'selected':''}>${lab}</option>`).join('')}</select></label>`;
}

function viewAdd(){
  const a=state.add;
  const showForm=a.status==='ready'||a.status==='manual';
  return `<section class="lc-section">
    <div class="lc-eyebrow">Catalogue a New Bottle</div>
    <h1 class="lc-h1">ถ่ายฉลาก แล้วให้ผู้ช่วยกรอกให้</h1>
    <p class="lc-lede">ถ่ายหรืออัปโหลดรูปฉลาก ผู้ช่วยจะอ่านและเติมข้อมูลให้ คุณตรวจแก้แล้วบันทึกเข้าตู้ รูปจะถูกเก็บไว้บน Google Drive</p>
    <div class="lc-add-grid">
      <div class="lc-drop">
        ${a.photoFull?`<img class="lc-drop-img" src="${a.photoFull}" alt="">`:'<div class="lc-drop-placeholder"><div class="lc-drop-mark">✦</div><div>ยังไม่มีรูป</div></div>'}
        <input type="file" id="file" accept="image/*" capture="environment" style="display:none">
        <button class="lc-btn lc-btn-gold" id="pick">${a.photoFull?'เปลี่ยนรูป':'ถ่าย / เลือกรูปฉลาก'}</button>
        ${a.status==='reading'?'<div class="lc-reading"><span class="lc-spin"></span>กำลังอ่านฉลาก…</div>':''}
        ${a.conf&&a.status==='ready'?`<div class="lc-conf lc-conf-${a.conf}">ความมั่นใจของผู้ช่วย: ${a.conf}</div>`:''}
        ${a.err?`<div class="lc-warn">${esc(a.err)}</div>`:''}
        ${a.status==='idle'?'<button class="lc-link" id="manual">หรือกรอกข้อมูลเองโดยไม่มีรูป →</button>':''}
      </div>
      ${showForm?`<div class="lc-form">
        <div class="lc-frow">${field('Producer','producer')}${field('Wine / Label','wineName')}</div>
        <div class="lc-frow">${field('Vintage','vintage','เช่น 2015 / เว้นว่าง = NV')}${field('Score / 100','score')}</div>
        <div class="lc-frow">${field('Country','country')}${field('Region / Appellation','region')}</div>
        <div class="lc-frow">${field('Sub-region','subRegion')}${field('Grape / Blend','grape')}</div>
        <div class="lc-frow">${select('Style','type',Object.entries(TYPE_LABEL))}${field('ราคา (บาท/ขวด)','price')}</div>
        <div class="lc-frow">${field('เก็บได้อีก (ปี)','yearsLeft')}${field('จำนวนขวด','quantity')}</div>
        ${select('ชั้นจัดเก็บในตู้','shelf',SHELVES.map(s=>[s.id,'Site '+s.id+' · '+s.th]))}
        <label class="lc-check"><input type="checkbox" id="soon" ${a.form.drinkSoon?'checked':''}><span>ถึงพีคแล้ว — ควรรีบดื่ม</span></label>
        ${field('โน้ต','notes','',true)}
        <button class="lc-btn lc-btn-gold lc-btn-full" id="save">เก็บเข้าตู้ Site ${a.form.shelf}</button>
      </div>`:''}
    </div></section>`;
}

let sortKey='recent', searchQ='';
function viewAll(){
  const ws=state.wines;
  if(!ws.length) return '<section class="lc-section"><div class="lc-eyebrow">All Bottles</div><p class="lc-lede">ยังไม่มีไวน์ในคลัง</p></section>';
  let rows=ws.filter(w=>{if(!searchQ)return true;const h=[w.producer,w.wineName,w.country,w.region,w.subRegion,w.grape,w.vintage].join(' ').toLowerCase();return h.includes(searchQ.toLowerCase());});
  const cmp={recent:(a,b)=>(b.addedAt||0)-(a.addedAt||0),score:(a,b)=>(Number(b.score)||0)-(Number(a.score)||0),vintage:(a,b)=>(Number(a.vintage)||9999)-(Number(b.vintage)||9999),producer:(a,b)=>String(a.producer||'').localeCompare(String(b.producer||''))};
  rows=[...rows].sort(cmp[sortKey]);
  return `<section class="lc-section">
    <div class="lc-eyebrow">All Bottles · ${ws.length} labels</div>
    <div class="lc-controls"><input class="lc-search" id="search" placeholder="ค้นหา producer, ภูมิภาค, องุ่น…" value="${esc(searchQ)}">
      <div class="lc-sort">${[['recent','Recent'],['score','Score'],['vintage','Vintage'],['producer','Producer']].map(([k,l])=>`<button class="lc-sort-btn ${sortKey===k?'is-active':''}" data-sort="${k}">${l}</button>`).join('')}</div></div>
    <div class="lc-table"><div class="lc-tr lc-th"><span>Bottle</span><span>Vintage</span><span>Origin</span><span>Score</span><span>Site</span><span>Qty</span><span></span></div>
    ${rows.map(w=>`<div class="lc-tr"><span class="lc-td-bottle">${w.photoId?`<img src="${photoUrl(w.photoId,120)}" alt="" loading="lazy">`:'<span class="lc-td-noimg">✦</span>'}<span><b>${esc(w.producer)||'—'}</b><br><span class="lc-muted">${esc(w.wineName)}</span></span></span>
      <span>${w.vintage||'NV'}</span><span class="lc-muted">${[w.region,w.country].filter(Boolean).map(esc).join(', ')||'—'}</span><span>${esc(w.score)||'—'}</span><span>Site ${w.shelf}</span>
      <span class="lc-qty lc-qty-sm"><button data-qty="-1" data-id="${w.id}">−</button><span>${w.quantity}</span><button data-qty="1" data-id="${w.id}">+</button></span>
      <span><button class="lc-del" data-del="${w.id}">✕</button></span></div>`).join('')}</div></section>`;
}

// ── connect / settings screen ─────────────────────────────────────────────────
function renderConnect(isSettings){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="lc-overlay"><div class="lc-conn">
    <h2>${isSettings?'Settings':'Connect your cellar'}</h2>
    <p>วาง Web App URL ของ Google Apps Script กับรหัสลับ (token) ของคุณ ข้อมูลนี้เก็บไว้ในเบราว์เซอร์เครื่องนี้เท่านั้น ไม่ถูกบันทึกขึ้น GitHub</p>
    <label>Apps Script Web App URL</label><input id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec" value="${CONFIG?esc(CONFIG.url):''}">
    <label>Access token</label><input id="cfg-token" placeholder="รหัสลับที่ตั้งไว้ใน Script Properties" value="${CONFIG?esc(CONFIG.token):''}">
    <button class="lc-btn lc-btn-gold lc-btn-full" id="cfg-save">บันทึกและเชื่อมต่อ</button>
    ${isSettings?'<button class="lc-link" id="cfg-cancel" style="display:block;margin:14px auto 0">ยกเลิก</button>':''}
  </div></div>`;
  document.getElementById('cfg-save').onclick=()=>{
    const url=document.getElementById('cfg-url').value.trim();
    const token=document.getElementById('cfg-token').value.trim();
    if(!url||!token){alert('กรอกให้ครบทั้งสองช่อง');return;}
    CONFIG={url,token};localStorage.setItem(LS_KEY,JSON.stringify(CONFIG));
    ov.innerHTML='';loadWines();
  };
  if(isSettings){const c=document.getElementById('cfg-cancel');if(c)c.onclick=()=>{ov.innerHTML='';};}
}

// ── add-flow actions ──────────────────────────────────────────────────────────
async function onFile(input){
  const file=input.files&&input.files[0];if(!file)return;
  state.add.status='reading';state.add.err='';state.add.conf=null;render();
  try{
    state.add.photoFull=await compress(file,1500,0.82);
    const forAI=await compress(file,1100,0.8);
    try{
      const r=await apiPost({action:'readLabel',image:forAI});
      const ai=r.data||{};
      Object.assign(state.add.form,{
        producer:ai.producer||'',wineName:ai.wineName||'',vintage:ai.vintage==null?'':String(ai.vintage),
        country:ai.country||'',region:ai.region||'',subRegion:ai.subRegion||'',grape:ai.grape||'',
        type:ai.type||'red',score:ai.score==null?'':String(ai.score),yearsLeft:ai.yearsLeft==null?'':String(ai.yearsLeft),
        drinkSoon:!!ai.drinkSoon,shelf:(ai.suggestedShelf>=1&&ai.suggestedShelf<=6)?ai.suggestedShelf:3});
      state.add.conf=ai.confidence||null;state.add.status='ready';
    }catch(aiErr){state.add.status='manual';state.add.err='ผู้ช่วยอ่านฉลากไม่สำเร็จ กรอกข้อมูลเองได้เลย รูปยังถูกเก็บไว้ ('+aiErr.message+')';}
  }catch(err){state.add.status='error';state.add.err='เปิดรูปไม่สำเร็จ ลองใหม่อีกครั้ง';}
  render();
}

async function saveWine(){
  const f=state.add.form;
  const btn=document.getElementById('save');if(btn){btn.disabled=true;btn.textContent='กำลังบันทึก…';}
  const wine={id:newId(),producer:f.producer,wineName:f.wineName,
    vintage:f.vintage?Number(f.vintage):'',country:f.country,region:f.region,subRegion:f.subRegion,
    grape:f.grape,type:f.type,score:f.score?Number(f.score):'',yearsLeft:f.yearsLeft===''?'':Number(f.yearsLeft),
    drinkSoon:!!f.drinkSoon,shelf:Number(f.shelf),quantity:Math.max(1,Number(f.quantity)||1),
    price:f.price?Number(f.price):'',notes:f.notes,photoId:'',addedAt:Date.now()};
  try{
    const r=await apiPost({action:'add',wine,image:state.add.photoFull});
    state.wines.unshift(r.wine);
    state.add={photoFull:null,status:'idle',err:'',conf:null,form:emptyForm()};
    state.tab='cellar';state.openShelf=wine.shelf;render();
  }catch(e){alert('บันทึกไม่สำเร็จ: '+e.message);if(btn){btn.disabled=false;btn.textContent='ลองอีกครั้ง';}}
}

async function adjust(id,delta){
  const w=state.wines.find(x=>x.id===id);if(!w)return;
  const prev=Number(w.quantity)||0;w.quantity=Math.max(0,prev+delta);render();
  try{await apiPost({action:'adjustQty',id,delta});}catch(e){w.quantity=prev;render();alert('อัปเดตไม่สำเร็จ: '+e.message);}
}
async function del(id){
  if(!confirm('ลบขวดนี้ออกจากคลัง?'))return;
  const idx=state.wines.findIndex(x=>x.id===id);const backup=state.wines[idx];
  state.wines=state.wines.filter(x=>x.id!==id);render();
  try{await apiPost({action:'delete',id});}catch(e){state.wines.splice(idx,0,backup);render();alert('ลบไม่สำเร็จ: '+e.message);}
}

// ── event binding ─────────────────────────────────────────────────────────────
function bind(){
  const main=document.getElementById('main');
  main.querySelectorAll('[data-shelf]').forEach(el=>el.onclick=()=>{const id=Number(el.dataset.shelf);state.tab='cellar';state.openShelf=state.openShelf===id?null:id;render();});
  main.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{state.tab=el.dataset.go;render();});
  main.querySelectorAll('[data-qty]').forEach(el=>el.onclick=()=>adjust(el.dataset.id,Number(el.dataset.qty)));
  main.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>del(el.dataset.del));
  main.querySelectorAll('[data-sort]').forEach(el=>el.onclick=()=>{sortKey=el.dataset.sort;render();});
  const search=main.querySelector('#search');if(search)search.oninput=()=>{searchQ=search.value;const p=search.selectionStart;render();const s2=document.getElementById('search');if(s2){s2.focus();s2.setSelectionRange(p,p);}};
  main.querySelectorAll('[data-f]').forEach(el=>el.oninput=()=>{state.add.form[el.dataset.f]=el.value;const lbl=document.getElementById('save');if(el.dataset.f==='shelf'&&lbl)lbl.textContent='เก็บเข้าตู้ Site '+el.value;});
  const soon=main.querySelector('#soon');if(soon)soon.onchange=()=>{state.add.form.drinkSoon=soon.checked;};
  const pick=main.querySelector('#pick'),file=main.querySelector('#file');
  if(pick&&file){pick.onclick=()=>file.click();file.onchange=()=>onFile(file);}
  const manual=main.querySelector('#manual');if(manual)manual.onclick=()=>{state.add.status='manual';render();};
  const save=main.querySelector('#save');if(save)save.onclick=saveWine;
}

document.querySelectorAll('.lc-nav-btn').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.openShelf=null;render();});
document.getElementById('gear').onclick=()=>renderConnect(true);

// ── boot ──────────────────────────────────────────────────────────────────────
if(CONFIG) loadWines(); else render();
</script>
